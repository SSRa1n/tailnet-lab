global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: headscale
    metrics_path: /metrics
    static_configs:
      - targets:
          - headscale:9090
  - job_name: tailscale_clients
    metrics_path: /metrics
    static_configs:
      - targets:
          - laptop-hj7lgaqh:5252
          - desktop-m8cauv3:5252