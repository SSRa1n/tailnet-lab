global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: headscale
    metrics_path: /metrics
    static_configs:
      - targets:
          - headscale:9090
  - job_name: tailscale_clients
    metrics_path: /metrics
    static_configs:
      - targets:
          - namoworker:5252
          - namoadmin:5252
          - namocleaner:5252